<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AmpUp chat widget: demo host</title>
    <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      color: #1a1a1a;
      background: #f5f5f4;
    }
    main {
      max-width: 540px;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 30px;
    }
    p {
      line-height: 1.6;
      color: #555;
    }
    code {
      display: inline-block;
      padding: 8px 12px;
      margin-top: 8px;
      font-size: 13px;
      background: #eceae7;
      border-radius: 8px;
    }
    </style>
  </head>
  <body>
    <main>
      <h1>Demo host page</h1>
      <p>
        This page is a stand-in for a customer's website. It embeds the AmpUp GTM chat with a single
        script tag. Click the launcher in the bottom-right to open the chat over your CRM, calls and
        notes.
      </p>
      <code>&lt;script src="/widget.js" data-theme="dark" async&gt;&lt;/script&gt;</code>
    </main>
    <!-- The widget: one tag, served from the app's own origin. -->
    <script src="/widget.js" data-theme="dark" async></script>
  </body>
</html>
